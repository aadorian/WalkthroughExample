<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent { fill: var(--vscode-textLink-foreground, #3794ff); }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .frame { stroke: var(--vscode-textLink-foreground, #3794ff); fill: none; }
    .code { font-family: var(--vscode-editor-font-family, "SF Mono", Monaco, Consolas, monospace); font-size: 13px; }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- UML class box -->
  <rect class="panel frame" x="110" y="40" width="180" height="160" rx="4" stroke-width="1.5"/>
  <line class="frame" x1="110" y1="78" x2="290" y2="78" stroke-width="1.5"/>
  <line class="frame" x1="110" y1="138" x2="290" y2="138" stroke-width="1.5"/>

  <text class="ui accent" x="200" y="64" text-anchor="middle" font-size="15" font-weight="700">Persona</text>

  <text class="code fg" x="126" y="103">- nombre: string</text>
  <text class="code fg" x="126" y="126">- edad: number</text>

  <text class="code fg" x="126" y="163">+ saludar(): void</text>
  <text class="code fg" x="126" y="186">+ getEdad(): number</text>

  <!-- Legend -->
  <text class="ui muted" x="200" y="235" text-anchor="middle" font-size="12">− privado&#160;&#160;&#160;&#160;+ público</text>
  <text class="ui fg" x="200" y="270" text-anchor="middle" font-size="14" font-weight="600">Model the world with classes</text>
</svg>
