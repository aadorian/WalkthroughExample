<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent { fill: var(--vscode-textLink-foreground, #3794ff); }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .frame { stroke: var(--vscode-widget-border, rgba(128, 128, 128, 0.35)); fill: none; }
    .code { font-family: var(--vscode-editor-font-family, "SF Mono", Monaco, Consolas, monospace); }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- Array cells -->
  <g>
    <rect class="panel frame" x="60" y="60" width="70" height="50" stroke-width="1.5"/>
    <rect class="panel frame" x="130" y="60" width="70" height="50" stroke-width="1.5"/>
    <rect class="panel frame" x="200" y="60" width="70" height="50" stroke-width="1.5"/>
    <rect class="panel frame" x="270" y="60" width="70" height="50" stroke-width="1.5"/>
    <text class="code fg" x="95" y="90" text-anchor="middle" font-size="14">12</text>
    <text class="code fg" x="165" y="90" text-anchor="middle" font-size="14">7</text>
    <text class="code fg" x="235" y="90" text-anchor="middle" font-size="14">25</text>
    <text class="code fg" x="305" y="90" text-anchor="middle" font-size="14">3</text>
    <text class="code muted" x="95" y="128" text-anchor="middle" font-size="11">[0]</text>
    <text class="code muted" x="165" y="128" text-anchor="middle" font-size="11">[1]</text>
    <text class="code muted" x="235" y="128" text-anchor="middle" font-size="11">[2]</text>
    <text class="code muted" x="305" y="128" text-anchor="middle" font-size="11">[3]</text>
  </g>

  <!-- Aggregation: Banco holds Cuentas -->
  <rect class="panel frame" x="60" y="165" width="120" height="42" rx="6" stroke-width="1.5"/>
  <text class="ui accent" x="120" y="191" text-anchor="middle" font-size="14" font-weight="700">Banco</text>
  <path d="M180 186 h 60 m -8 -5 l 8 5 l -8 5" fill="none" stroke="var(--vscode-foreground, #cccccc)" stroke-width="1.5"/>
  <text class="ui muted" x="210" y="176" text-anchor="middle" font-size="11">1..*</text>
  <rect class="panel frame" x="240" y="165" width="120" height="42" rx="6" stroke-width="1.5"/>
  <text class="ui fg" x="300" y="191" text-anchor="middle" font-size="14" font-weight="600">Cuenta</text>

  <text class="ui muted" x="200" y="240" text-anchor="middle" font-size="12">arrays · listas · mapas</text>
  <text class="ui fg" x="200" y="272" text-anchor="middle" font-size="14" font-weight="600">Organize many objects at once</text>
</svg>
