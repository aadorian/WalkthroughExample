<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1e1e1e; }
      }
      .text-primary { fill: #333; }
      @media (prefers-color-scheme: dark) {
        .text-primary { fill: #e0e0e0; }
      }
      .text-secondary { fill: #666; }
      @media (prefers-color-scheme: dark) {
        .text-secondary { fill: #a0a0a0; }
      }
      .accent { fill: #0078d4; stroke: #0078d4; }
      .box { stroke: #0078d4; stroke-width: 2; fill: none; }
    </style>
  </defs>

  <rect class="bg" width="400" height="300"/>

  <!-- Title -->
  <text class="text-primary" x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold">Fundamentals</text>

  <!-- System Box -->
  <rect class="box" x="20" y="60" width="100" height="80" rx="4"/>
  <text class="text-primary" x="70" y="80" text-anchor="middle" font-size="12" font-weight="bold">Sistema</text>
  <text class="text-secondary" x="70" y="100" text-anchor="middle" font-size="10">Hardware</text>
  <text class="text-secondary" x="70" y="115" text-anchor="middle" font-size="10">Software</text>
  <text class="text-secondary" x="70" y="130" text-anchor="middle" font-size="10">Personas</text>

  <!-- Algorithm/Pseudocode Box -->
  <rect class="box" x="150" y="60" width="100" height="80" rx="4"/>
  <text class="text-primary" x="200" y="80" text-anchor="middle" font-size="12" font-weight="bold">Algoritmo</text>
  <line x1="160" y1="95" x2="240" y2="95" class="accent" stroke-width="1"/>
  <text class="text-secondary" x="200" y="110" text-anchor="middle" font-size="9">Paso 1</text>
  <text class="text-secondary" x="200" y="125" text-anchor="middle" font-size="9">Paso 2</text>

  <!-- Design/UML Box -->
  <rect class="box" x="280" y="60" width="100" height="80" rx="4"/>
  <text class="text-primary" x="330" y="80" text-anchor="middle" font-size="12" font-weight="bold">Diseño</text>
  <rect x="295" y="95" width="30" height="40" class="box"/>
  <line x1="310" y1="105" x2="320" y2="105" class="accent" stroke-width="1"/>
  <line x1="310" y1="120" x2="320" y2="120" class="accent" stroke-width="1"/>

  <!-- Arrows connecting boxes -->
  <path d="M 120 100 L 150 100" class="accent" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>
  <path d="M 250 100 L 280 100" class="accent" stroke-width="2" fill="none" marker-end="url(#arrowhead)"/>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrowhead" markerWidth="10" markerHeight="10" refX="9" refY="3" orient="auto">
      <polygon points="0 0, 10 3, 0 6" fill="#0078d4"/>
    </marker>
  </defs>

  <!-- Lifecycle section -->
  <text class="text-primary" x="20" y="180" font-size="12" font-weight="bold">Ciclo de vida del software:</text>

  <text class="text-secondary" x="20" y="205" font-size="11">1. Análisis → entender QUÉ se necesita</text>
  <text class="text-secondary" x="20" y="225" font-size="11">2. Diseño → decidir CÓMO se construye</text>
  <text class="text-secondary" x="20" y="245" font-size="11">3. Implementación → escribir código</text>
  <text class="text-secondary" x="20" y="265" font-size="11">4. Prueba → verificar que funciona</text>
</svg>