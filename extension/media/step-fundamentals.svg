<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent-stroke { stroke: var(--vscode-textLink-foreground, #3794ff); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- Problema -->
  <rect class="panel accent-stroke" x="130" y="30" width="140" height="46" rx="8" stroke-width="1.5"/>
  <text class="ui fg" x="200" y="58" text-anchor="middle" font-size="14" font-weight="600">Problema</text>

  <path class="accent-stroke" d="M200 76 v22 m-6 -8 l6 8 l6 -8" fill="none" stroke-width="2"/>

  <!-- Algoritmo -->
  <rect class="panel accent-stroke" x="130" y="102" width="140" height="46" rx="8" stroke-width="1.5"/>
  <text class="ui fg" x="200" y="130" text-anchor="middle" font-size="14" font-weight="600">Algoritmo</text>

  <path class="accent-stroke" d="M200 148 v22 m-6 -8 l6 8 l6 -8" fill="none" stroke-width="2"/>

  <!-- Programa -->
  <rect class="panel accent-stroke" x="130" y="174" width="140" height="46" rx="8" stroke-width="1.5"/>
  <text class="ui fg" x="200" y="202" text-anchor="middle" font-size="14" font-weight="600">Programa</text>

  <!-- Side notes -->
  <text class="ui muted" x="285" y="58" font-size="11">entender</text>
  <text class="ui muted" x="285" y="130" font-size="11">diseñar</text>
  <text class="ui muted" x="285" y="202" font-size="11">codificar</text>

  <text class="ui fg" x="200" y="270" text-anchor="middle" font-size="14" font-weight="600">Design first, code second</text>
</svg>
