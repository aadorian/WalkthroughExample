<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .icon-bg { fill: #0078d4; }
      .icon-fg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .icon-bg { fill: #0098ff; }
      }
    </style>
  </defs>

  <!-- Rounded square background -->
  <rect class="icon-bg" x="0" y="0" width="128" height="128" rx="24"/>

  <!-- Book/Learning icon -->
  <g class="icon-fg">
    <!-- Book pages -->
    <path d="M 32 30 L 32 98 Q 32 104 38 104 L 96 104 Q 102 104 102 98 L 102 30 Q 102 24 96 24 L 38 24 Q 32 24 32 30" fill="none" stroke="currentColor" stroke-width="4" stroke-linecap="round" stroke-linejoin="round"/>

    <!-- Spine -->
    <line x1="64" y1="30" x2="64" y2="104" stroke="currentColor" stroke-width="2"/>

    <!-- Page lines (left) -->
    <line x1="42" y1="45" x2="60" y2="45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="60" x2="60" y2="60" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="42" y1="75" x2="60" y2="75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>

    <!-- Page lines (right) -->
    <line x1="70" y1="45" x2="92" y2="45" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="60" x2="92" y2="60" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
    <line x1="70" y1="75" x2="92" y2="75" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
  </g>
</svg>