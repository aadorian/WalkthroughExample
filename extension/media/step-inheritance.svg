<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent { fill: var(--vscode-textLink-foreground, #3794ff); }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .frame { stroke: var(--vscode-textLink-foreground, #3794ff); fill: none; }
    .arrow { stroke: var(--vscode-foreground, #cccccc); fill: none; }
    .head { fill: none; stroke: var(--vscode-foreground, #cccccc); }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- Base class (abstract) -->
  <rect class="panel frame" x="140" y="35" width="120" height="42" rx="4" stroke-width="1.5"/>
  <text class="ui accent" x="200" y="61" text-anchor="middle" font-size="14" font-weight="700" font-style="italic">Empleado</text>

  <!-- Inheritance arrows (hollow triangle = UML generalization) -->
  <path class="arrow" d="M120 170 L 185 92" stroke-width="1.5"/>
  <path class="arrow" d="M280 170 L 215 92" stroke-width="1.5"/>
  <path class="head" d="M178 96 l 10 -12 l 6 14 z" stroke-width="1.5"/>
  <path class="head" d="M222 96 l -10 -12 l -6 14 z" stroke-width="1.5"/>

  <!-- Subclasses -->
  <rect class="panel frame" x="55" y="170" width="130" height="42" rx="4" stroke-width="1.5"/>
  <text class="ui fg" x="120" y="196" text-anchor="middle" font-size="14" font-weight="600">Gerente</text>

  <rect class="panel frame" x="215" y="170" width="130" height="42" rx="4" stroke-width="1.5"/>
  <text class="ui fg" x="280" y="196" text-anchor="middle" font-size="14" font-weight="600">Vendedor</text>

  <text class="ui muted" x="200" y="240" text-anchor="middle" font-size="12">cada uno redefine getSueldo()</text>
  <text class="ui fg" x="200" y="272" text-anchor="middle" font-size="14" font-weight="600">One interface, many behaviors</text>
</svg>
