<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent { fill: var(--vscode-textLink-foreground, #3794ff); }
    .ok { fill: var(--vscode-charts-green, #89d185); }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .frame { stroke: var(--vscode-widget-border, rgba(128, 128, 128, 0.35)); fill: none; }
    .code { font-family: var(--vscode-editor-font-family, "SF Mono", Monaco, Consolas, monospace); font-size: 13px; }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- Terminal window -->
  <rect class="panel" x="30" y="50" width="340" height="200" rx="8"/>
  <rect class="frame" x="30" y="50" width="340" height="200" rx="8" stroke-width="1.5"/>

  <!-- Title bar -->
  <line x1="30" y1="82" x2="370" y2="82" stroke="var(--vscode-widget-border, rgba(128, 128, 128, 0.35))" stroke-width="1.5"/>
  <circle cx="52" cy="66" r="5" class="muted"/>
  <circle cx="70" cy="66" r="5" class="muted"/>
  <circle cx="88" cy="66" r="5" class="muted"/>
  <text class="ui muted" x="200" y="71" text-anchor="middle" font-size="12">Terminal</text>

  <!-- Session -->
  <text class="code accent" x="50" y="115">$ <tspan class="fg">npm install -g tsx</tspan></text>
  <text class="code ok" x="50" y="145">✓ added 1 package</text>
  <text class="code accent" x="50" y="185">$ <tspan class="fg">tsx ejemplo.ts</tspan></text>
  <text class="code muted" x="50" y="215">¡Hola, TypeScript!</text>

  <text class="ui fg" x="200" y="285" text-anchor="middle" font-size="14" font-weight="600">One install, every example runs</text>
</svg>
