<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      :root[data-theme="dark"] .bg { fill: #1e1e1e; }
      :root[data-theme="light"] .bg { fill: #ffffff; }
      .bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1e1e1e; }
      }
      .text-primary { fill: #333; }
      @media (prefers-color-scheme: dark) {
        .text-primary { fill: #e0e0e0; }
      }
      .text-accent { fill: #0078d4; }
      .icon-circle { stroke: #0078d4; stroke-width: 2; fill: none; }
      .check-mark { fill: #107c10; }
    </style>
  </defs>

  <rect class="bg" width="400" height="300"/>

  <!-- Node.js Logo Area -->
  <circle class="icon-circle" cx="80" cy="80" r="40"/>
  <text class="text-primary" x="80" y="90" text-anchor="middle" font-size="24" font-weight="bold">Node</text>
  <circle cx="75" cy="125" r="5" class="check-mark"/>

  <!-- Terminal/CLI Area -->
  <circle class="icon-circle" cx="200" cy="80" r="40"/>
  <rect x="175" y="55" width="50" height="40" fill="none" stroke="#0078d4" stroke-width="2" rx="2"/>
  <line x1="180" y1="70" x2="220" y2="70" stroke="#0078d4" stroke-width="2"/>
  <line x1="180" y1="80" x2="210" y2="80" stroke="#0078d4" stroke-width="2"/>
  <circle cx="195" cy="125" r="5" class="check-mark"/>

  <!-- tsx Installation Area -->
  <circle class="icon-circle" cx="320" cy="80" r="40"/>
  <text class="text-primary" x="320" y="95" text-anchor="middle" font-size="18" font-weight="bold">tsx</text>
  <circle cx="315" cy="125" r="5" class="check-mark"/>

  <!-- Installation Command -->
  <rect x="20" y="170" width="360" height="60" fill="none" stroke="#0078d4" stroke-width="2" rx="4"/>
  <text class="text-primary" x="30" y="190" font-size="12" font-family="monospace">npm install -g tsx</text>
  <text class="text-primary" x="30" y="210" font-size="11" font-weight="500">Then run your TypeScript files:</text>
  <text class="text-accent" x="30" y="225" font-size="11" font-family="monospace">tsx example.ts</text>

  <!-- Title -->
  <text class="text-primary" x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold">Setup Your Environment</text>
</svg>