<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1e1e1e; }
      }
      .text-primary { fill: #333; }
      @media (prefers-color-scheme: dark) {
        .text-primary { fill: #e0e0e0; }
      }
      .text-secondary { fill: #666; }
      @media (prefers-color-scheme: dark) {
        .text-secondary { fill: #a0a0a0; }
      }
      .skill-box { stroke: #0078d4; stroke-width: 2; fill: none; }
      .check { fill: #107c10; }
    </style>
  </defs>

  <rect class="bg" width="400" height="300"/>

  <!-- Title -->
  <text class="text-primary" x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold">Capstone Project</text>

  <!-- Skills -->
  <rect class="skill-box" x="20" y="55" width="80" height="60" rx="4"/>
  <text class="text-primary" x="60" y="75" text-anchor="middle" font-size="11" font-weight="bold">Classes</text>
  <text class="text-secondary" x="60" y="92" text-anchor="middle" font-size="8">Design</text>
  <text class="text-secondary" x="60" y="103" text-anchor="middle" font-size="8">OOP</text>
  <circle cx="75" cy="50" r="5" class="check"/>

  <rect class="skill-box" x="110" y="55" width="80" height="60" rx="4"/>
  <text class="text-primary" x="150" y="75" text-anchor="middle" font-size="11" font-weight="bold">Collections</text>
  <text class="text-secondary" x="150" y="92" text-anchor="middle" font-size="8">Lists, Arrays</text>
  <text class="text-secondary" x="150" y="103" text-anchor="middle" font-size="8">Maps</text>
  <circle cx="165" cy="50" r="5" class="check"/>

  <rect class="skill-box" x="200" y="55" width="80" height="60" rx="4"/>
  <text class="text-primary" x="240" y="75" text-anchor="middle" font-size="11" font-weight="bold">Inheritance</text>
  <text class="text-secondary" x="240" y="92" text-anchor="middle" font-size="8">Polymorphism</text>
  <text class="text-secondary" x="240" y="103" text-anchor="middle" font-size="8">Abstraction</text>
  <circle cx="255" cy="50" r="5" class="check"/>

  <rect class="skill-box" x="290" y="55" width="90" height="60" rx="4"/>
  <text class="text-primary" x="335" y="75" text-anchor="middle" font-size="11" font-weight="bold">Advanced</text>
  <text class="text-secondary" x="335" y="92" text-anchor="middle" font-size="8">Exceptions,</text>
  <text class="text-secondary" x="335" y="103" text-anchor="middle" font-size="8">Interfaces</text>
  <circle cx="350" cy="50" r="5" class="check"/>

  <!-- Arrow down -->
  <path d="M 200 130 L 200 160" stroke="#0078d4" stroke-width="3"/>

  <!-- Project Box -->
  <rect x="60" y="160" width="280" height="110" fill="none" stroke="#107c10" stroke-width="3" rx="4"/>

  <text class="text-primary" x="200" y="185" text-anchor="middle" font-size="14" font-weight="bold">🎯 Build a Real Application</text>

  <text class="text-secondary" x="80" y="210" font-size="11">✓ Apply all OOP principles</text>
  <text class="text-secondary" x="80" y="227" font-size="11">✓ Manage collections of objects</text>
  <text class="text-secondary" x="80" y="244" font-size="11">✓ Handle errors gracefully</text>
  <text class="text-secondary" x="80" y="261" font-size="11">✓ Design with UML first</text>

  <!-- Certificate indicator -->
  <text class="text-primary" x="200" y="293" text-anchor="middle" font-size="12" font-weight="bold">🎓 You're ready for real projects!</text>
</svg>