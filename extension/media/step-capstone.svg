<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent { fill: var(--vscode-textLink-foreground, #3794ff); }
    .ok { stroke: var(--vscode-charts-green, #89d185); fill: none; }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .frame { stroke: var(--vscode-widget-border, rgba(128, 128, 128, 0.35)); fill: none; }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- Checklist card -->
  <rect class="panel" x="55" y="35" width="290" height="200" rx="8"/>
  <rect class="frame" x="55" y="35" width="290" height="200" rx="8" stroke-width="1.5"/>
  <text class="ui accent" x="200" y="65" text-anchor="middle" font-size="15" font-weight="700">Proyecto integrador</text>

  <g stroke-width="2">
    <path class="ok" d="M80 88 l 5 6 l 10 -12"/>
    <path class="ok" d="M80 118 l 5 6 l 10 -12"/>
    <path class="ok" d="M80 148 l 5 6 l 10 -12"/>
    <path class="ok" d="M80 178 l 5 6 l 10 -12"/>
    <path class="ok" d="M80 208 l 5 6 l 10 -12"/>
  </g>

  <text class="ui fg" x="108" y="92" font-size="13">Clases y encapsulamiento</text>
  <text class="ui fg" x="108" y="122" font-size="13">Herencia y polimorfismo</text>
  <text class="ui fg" x="108" y="152" font-size="13">Colecciones y arrays</text>
  <text class="ui fg" x="108" y="182" font-size="13">Excepciones y búsqueda</text>
  <text class="ui fg" x="108" y="212" font-size="13">Del UML al código</text>

  <text class="ui fg" x="200" y="272" text-anchor="middle" font-size="14" font-weight="600">Everything comes together</text>
</svg>
