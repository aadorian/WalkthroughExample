<svg viewBox="0 0 400 300" width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <style>
    .fg { fill: var(--vscode-foreground, #cccccc); }
    .accent { fill: var(--vscode-textLink-foreground, #3794ff); }
    .ok { fill: var(--vscode-charts-green, #89d185); }
    .muted { fill: var(--vscode-descriptionForeground, #999999); }
    .panel { fill: var(--vscode-textCodeBlock-background, rgba(128, 128, 128, 0.15)); }
    .frame { stroke: var(--vscode-widget-border, rgba(128, 128, 128, 0.35)); fill: none; }
    .code { font-family: var(--vscode-editor-font-family, "SF Mono", Monaco, Consolas, monospace); font-size: 13px; }
    .ui { font-family: var(--vscode-font-family, sans-serif); }
  </style>

  <!-- Code card -->
  <rect class="panel" x="40" y="45" width="320" height="150" rx="8"/>
  <rect class="frame" x="40" y="45" width="320" height="150" rx="8" stroke-width="1.5"/>

  <text class="code" x="60" y="80"><tspan class="accent">let</tspan><tspan class="fg"> nombre: </tspan><tspan class="accent">string</tspan><tspan class="fg"> = </tspan><tspan class="ok">"Ana"</tspan><tspan class="fg">;</tspan></text>
  <text class="code" x="60" y="110"><tspan class="accent">let</tspan><tspan class="fg"> edad: </tspan><tspan class="accent">number</tspan><tspan class="fg"> = </tspan><tspan class="ok">20</tspan><tspan class="fg">;</tspan></text>
  <text class="code" x="60" y="140"><tspan class="accent">const</tspan><tspan class="fg"> activo = </tspan><tspan class="ok">true</tspan><tspan class="fg">;</tspan></text>
  <text class="code muted" x="60" y="170">// cada variable tiene un tipo</text>

  <!-- Output line -->
  <text class="code" x="60" y="230"><tspan class="accent">▶</tspan><tspan class="fg"> console.log(nombre, edad);</tspan></text>
  <text class="code muted" x="76" y="255">Ana 20</text>

  <text class="ui fg" x="200" y="288" text-anchor="middle" font-size="14" font-weight="600">Typed variables, live results</text>
</svg>
