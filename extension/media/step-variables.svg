<svg viewBox="0 0 400 300" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <style>
      .bg { fill: #ffffff; }
      @media (prefers-color-scheme: dark) {
        .bg { fill: #1e1e1e; }
      }
      .text-primary { fill: #333; }
      @media (prefers-color-scheme: dark) {
        .text-primary { fill: #e0e0e0; }
      }
      .text-secondary { fill: #666; }
      @media (prefers-color-scheme: dark) {
        .text-secondary { fill: #a0a0a0; }
      }
      .code-bg { fill: #f5f5f5; stroke: #0078d4; stroke-width: 2; }
      @media (prefers-color-scheme: dark) {
        .code-bg { fill: #252526; }
      }
      .string { fill: #c41a16; }
      .number { fill: #0000ff; }
      .keyword { fill: #008080; font-weight: bold; }
    </style>
  </defs>

  <rect class="bg" width="400" height="300"/>

  <!-- Title -->
  <text class="text-primary" x="200" y="35" text-anchor="middle" font-size="16" font-weight="bold">Variables & Types</text>

  <!-- String example -->
  <rect class="code-bg" x="20" y="60" width="110" height="70" rx="4"/>
  <text class="keyword" x="30" y="80" font-family="monospace" font-size="11">let</text>
  <text class="text-primary" x="52" y="80" font-family="monospace" font-size="11">nombre</text>
  <text class="text-primary" x="115" y="80" font-family="monospace" font-size="11">=</text>
  <text class="string" x="30" y="100" font-family="monospace" font-size="11">"Ana"</text>
  <text class="text-secondary" x="30" y="120" font-size="9">tipo: string</text>

  <!-- Number example -->
  <rect class="code-bg" x="145" y="60" width="110" height="70" rx="4"/>
  <text class="keyword" x="155" y="80" font-family="monospace" font-size="11">let</text>
  <text class="text-primary" x="177" y="80" font-family="monospace" font-size="11">edad</text>
  <text class="text-primary" x="210" y="80" font-family="monospace" font-size="11">=</text>
  <text class="number" x="155" y="100" font-family="monospace" font-size="11">25</text>
  <text class="text-secondary" x="155" y="120" font-size="9">tipo: number</text>

  <!-- Boolean example -->
  <rect class="code-bg" x="270" y="60" width="110" height="70" rx="4"/>
  <text class="keyword" x="280" y="80" font-family="monospace" font-size="11">let</text>
  <text class="text-primary" x="302" y="80" font-family="monospace" font-size="11">activo</text>
  <text class="text-primary" x="353" y="80" font-family="monospace" font-size="11">=</text>
  <text class="keyword" x="280" y="100" font-family="monospace" font-size="11">true</text>
  <text class="text-secondary" x="280" y="120" font-size="9">tipo: boolean</text>

  <!-- Type conversion -->
  <text class="text-primary" x="20" y="165" font-size="12" font-weight="bold">Type Conversions:</text>

  <!-- String to Number -->
  <rect class="code-bg" x="20" y="180" width="170" height="55" rx="4"/>
  <text class="text-primary" x="30" y="197" font-family="monospace" font-size="10">const n = Number("42")</text>
  <text class="text-primary" x="30" y="212" font-family="monospace" font-size="10">const x = parseInt("42.9")</text>
  <text class="text-secondary" x="30" y="227" font-size="9">String → Number</text>

  <!-- Number to String -->
  <rect class="code-bg" x="210" y="180" width="170" height="55" rx="4"/>
  <text class="text-primary" x="220" y="197" font-family="monospace" font-size="10">const s = String(42)</text>
  <text class="text-primary" x="220" y="212" font-family="monospace" font-size="10">const t = (42).toFixed(2)</text>
  <text class="text-secondary" x="220" y="227" font-size="9">Number → String</text>

  <!-- Tip -->
  <rect x="20" y="255" width="360" height="35" fill="#fffacd" stroke="#ffcc00" stroke-width="1" rx="4"/>
  <text class="text-primary" x="30" y="273" font-size="11" font-weight="bold">💡 Tip:</text>
  <text class="text-secondary" x="75" y="273" font-size="10">After converting user input, always check with Number.isNaN()</text>
</svg>